apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis
  namespace: social-media-platform
spec:
  replicas: 1
  selector:
    matchLabels:
      app: redis
  template:
    metadata:
      labels:
        app: redis
    spec:
      containers:
      - name: redis
        image: redis:7-alpine
        ports:
        - containerPort: 6379
        resources:
          limits:
            memory: 256Mi
---
apiVersion: v1
kind: Service
metadata:
  name: redis
  namespace: social-media-platform
spec:
  selector:
    app: redis
  ports:
  - port: 6379
